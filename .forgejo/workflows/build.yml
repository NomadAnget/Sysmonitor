name: Build EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # 构建 Windows exe 必须用 Windows runner (PyInstaller 不支持交叉编译);
    # 需在 Forgejo 上注册一个标签为 windows 的自托管 runner
    runs-on: windows
    # 双保险: 这版 Forgejo 对 tags 过滤不严, 普通 push 也会触发, 这里再拦一次
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        # 用模块方式调用, 不依赖 Scripts 目录在 PATH (商店版 Python 的后台会话没有)
        run: python -m PyInstaller SysMonitor.spec --noconfirm

      # 不用 upload-artifact: 其上传地址由服务器按公网 ROOT_URL 下发,
      # 会被 openresty 反代 403; 且 act_runner v0.2.13 不支持 continue-on-error,
      # 一失败就挂整个 job。产物统一通过下面的 Release 内网直传发布。
      - name: Create release and attach exe (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        # 用 Windows 自带的 powershell 5.1 (机器上未装 pwsh 7)
        shell: powershell
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 内网直连 Forgejo, 绕开公网反代的上传限制
          API: http://debian.lan:3257/api/v1
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{ Authorization = "token $env:TOKEN" }
          $rel = Invoke-RestMethod -Method Post -Headers $headers `
            -Uri "$env:API/repos/$env:REPO/releases" `
            -ContentType "application/json" `
            -Body (@{ tag_name = $env:TAG; name = $env:TAG } | ConvertTo-Json)
          curl.exe -sf -X POST -H "Authorization: token $env:TOKEN" `
            -F "attachment=@dist/SysMonitor.exe" `
            "$env:API/repos/$env:REPO/releases/$($rel.id)/assets?name=SysMonitor.exe"
          Write-Host "Release $env:TAG 已创建并附加 SysMonitor.exe"
