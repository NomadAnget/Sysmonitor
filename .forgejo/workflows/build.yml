name: Build EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # 构建 Windows exe 必须用 Windows runner (PyInstaller 不支持交叉编译);
    # 需在 Forgejo 上注册一个标签为 windows 的自托管 runner
    runs-on: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        # 用模块方式调用, 不依赖 Scripts 目录在 PATH (商店版 Python 的后台会话没有)
        run: python -m PyInstaller SysMonitor.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: SysMonitor
          path: dist/SysMonitor.exe

      - name: Create release and attach exe (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          $headers = @{ Authorization = "token $env:TOKEN" }
          $rel = Invoke-RestMethod -Method Post -Headers $headers `
            -Uri "$env:API/repos/$env:REPO/releases" `
            -ContentType "application/json" `
            -Body (@{ tag_name = $env:TAG; name = $env:TAG } | ConvertTo-Json)
          curl.exe -sf -X POST -H "Authorization: token $env:TOKEN" `
            -F "attachment=@dist/SysMonitor.exe" `
            "$env:API/repos/$env:REPO/releases/$($rel.id)/assets?name=SysMonitor.exe"
