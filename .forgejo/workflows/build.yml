name: Build EXE

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # 构建 Windows exe 必须用 Windows runner (Nuitka 不支持交叉编译);
    # 自托管 runner 标签 windows (host 模式), 机器需已安装 uv 与 C 编译器
    runs-on: windows
    # 双保险: 这版 Forgejo 对 tags 过滤不严, 普通 push 也会触发, 这里再拦一次
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync environment (uv)
        run: uv sync --group dev

      - name: Download third-party dependencies
        run: ./scripts/get-deps.ps1

      - name: Build with Nuitka
        # 与本地构建命令一致; CI 中不加 --clean-cache=all 以复用编译缓存
        run: >
          uv run python -m nuitka --standalone --onefile
          --windows-console-mode=disable --windows-uac-admin
          --plugin-enable=pyqt6
          --include-raw-dir=libs=libs
          --windows-icon-from-ico=libs/logo.ico
          --assume-yes-for-downloads
          -o SysMonitor.exe main.py

      # 不用 upload-artifact: 其上传地址由服务器按公网 ROOT_URL 下发,
      # 会被 openresty 反代 403; 且 act_runner v0.2.13 不支持 continue-on-error。
      # 产物统一通过下面的 Release 内网直传发布。
      - name: Create release and attach exe (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        # 用 Windows 自带的 powershell 5.1 (机器上未装 pwsh 7)
        shell: powershell
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 内网直连 Forgejo, 绕开公网反代的上传限制
          API: http://debian.lan:3257/api/v1
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{ Authorization = "token $env:TOKEN" }
          # Reuse existing release for this tag (re-run safety), else create
          $rel = $null
          try {
            $rel = Invoke-RestMethod -Headers $headers `
              -Uri "$env:API/repos/$env:REPO/releases/tags/$env:TAG"
            Write-Host "Reusing existing release id=$($rel.id)"
          } catch { }
          if (-not $rel) {
            try {
              $rel = Invoke-RestMethod -Method Post -Headers $headers `
                -Uri "$env:API/repos/$env:REPO/releases" `
                -ContentType "application/json" `
                -Body (@{ tag_name = $env:TAG; name = $env:TAG } | ConvertTo-Json)
            } catch {
              $resp = $_.Exception.Response
              if ($resp) {
                $sr = New-Object IO.StreamReader($resp.GetResponseStream())
                Write-Host ("Create release failed: HTTP {0}  body: {1}" -f `
                  [int]$resp.StatusCode, $sr.ReadToEnd())
              }
              throw
            }
          }
          curl.exe -sf -X POST -H "Authorization: token $env:TOKEN" `
            -F "attachment=@SysMonitor.exe" `
            "$env:API/repos/$env:REPO/releases/$($rel.id)/assets?name=SysMonitor.exe"
          if ($LASTEXITCODE -ne 0) { throw "asset upload failed: $LASTEXITCODE" }
          Write-Host "Release $env:TAG done with SysMonitor.exe attached"
